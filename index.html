<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhyankar's Job Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}

/* Header */
header{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);color:#fff;padding:24px 36px}
.header-inner{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:20px;max-width:1400px;margin:0 auto}
header h1{font-size:1.7rem;font-weight:800;letter-spacing:-0.02em}
header h1 span{color:#60a5fa}
header p{color:#94a3b8;font-size:0.85rem;margin-top:5px;line-height:1.5}
.stats{display:flex;gap:28px;flex-shrink:0}
.stat .num{font-size:2rem;font-weight:800;color:#60a5fa;line-height:1}
.stat .lbl{font-size:0.7rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

/* Filters */
.filters{background:#fff;padding:14px 36px;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:20;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.filters-inner{display:flex;gap:10px;flex-wrap:wrap;align-items:center;max-width:1400px;margin:0 auto}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none}
input[type=text]{width:100%;padding:9px 12px 9px 34px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.875rem;outline:none;transition:.15s}
input[type=text]:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12)}
select{padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.85rem;outline:none;background:#fff;cursor:pointer;color:#374151;transition:.15s}
select:focus{border-color:#3b82f6}
.scrape-btn{margin-left:auto;padding:9px 18px;background:#0f172a;color:#fff;border:none;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;white-space:nowrap}
.scrape-btn:hover{background:#1e3a5f}
.scrape-btn:disabled{opacity:.5;cursor:not-allowed}

/* Main */
.main{padding:24px 36px;max-width:1400px;margin:0 auto}
.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.results-count{color:#64748b;font-size:.875rem;font-weight:500}
.view-btns{display:flex;border:1.5px solid #e2e8f0;border-radius:8px;overflow:hidden;background:#fff}
.view-btn{padding:6px 12px;border:none;background:transparent;cursor:pointer;font-size:.8rem;color:#64748b;transition:.15s}
.view-btn.active{background:#0f172a;color:#fff}

/* Grid / List */
.jobs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px}
.jobs-list{display:flex;flex-direction:column;gap:10px}

/* Card */
.job-card{background:#fff;border-radius:12px;padding:20px;border:1.5px solid #e2e8f0;cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.job-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;transition:.2s}
.job-card:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.09);border-color:#bfdbfe}
.job-card.saved::before{background:#f59e0b}
.job-card.applied::before{background:#10b981}
.job-card.interview::before{background:#8b5cf6}
.job-card.rejected::before{background:#ef4444;opacity:.5}
.job-card.rejected{opacity:.65}

.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}
.company-row{display:flex;align-items:center;gap:12px;min-width:0}
.logo{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:.95rem;flex-shrink:0;letter-spacing:.02em}
.company-name{font-size:.78rem;color:#64748b;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-title{font-size:.98rem;font-weight:700;color:#0f172a;line-height:1.3}
.match-pill{padding:4px 9px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;flex-shrink:0}
.match-high{background:#dcfce7;color:#166534}
.match-mid{background:#fef9c3;color:#854d0e}
.match-low{background:#f1f5f9;color:#64748b}

.meta-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px}
.meta-chip{padding:3px 9px;border-radius:5px;font-size:.72rem;color:#475569;background:#f8fafc;display:flex;align-items:center;gap:3px;border:1px solid #e2e8f0}
.meta-chip.remote-chip{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.meta-chip.hybrid-chip{background:#f0fdf4;color:#166534;border-color:#bbf7d0}

.tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;min-height:22px}
.tag{padding:2px 8px;border-radius:20px;font-size:.68rem;background:#eff6ff;color:#1e40af;border:1px solid #dbeafe}
.tag.skill-match{background:#dbeafe;color:#1e3a8a;font-weight:700;border-color:#93c5fd}

.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #f1f5f9}
.footer-left{font-size:.72rem;color:#94a3b8;line-height:1.6}
.footer-left .source{color:#cbd5e1}
.card-btns{display:flex;gap:6px;align-items:center}
.btn-apply{padding:6px 13px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:.15s}
.btn-apply:hover{background:#1d4ed8}
.btn-save{padding:6px 11px;background:#fff;color:#f59e0b;border:1.5px solid #fcd34d;border-radius:6px;font-size:.75rem;font-weight:600;cursor:pointer;transition:.15s}
.btn-save:hover,.btn-save.on{background:#fef3c7}
.btn-save.on{color:#92400e;border-color:#f59e0b}

/* Status badge */
.status-dot{position:absolute;top:14px;right:14px;padding:3px 8px;border-radius:20px;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.dot-saved{background:#fef3c7;color:#92400e}
.dot-applied{background:#dcfce7;color:#166534}
.dot-interview{background:#ede9fe;color:#6d28d9}
.dot-rejected{background:#fee2e2;color:#991b1b}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;max-width:620px;width:100%;max-height:88vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:#f1f5f9;border:none;border-radius:6px;width:32px;height:32px;font-size:1.1rem;cursor:pointer;color:#64748b;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:#e2e8f0}
.modal h2{font-size:1.25rem;font-weight:800;color:#0f172a;margin-bottom:4px;padding-right:40px}
.modal-co{color:#64748b;font-size:.875rem;margin-bottom:18px}
.modal-sec{margin-bottom:18px}
.modal-sec h3{font-size:.72rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.modal-desc{font-size:.875rem;color:#475569;line-height:1.7}
.modal-status{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.875rem;outline:none;background:#fff;cursor:pointer}
.modal-status:focus{border-color:#3b82f6}
.modal-notes{width:100%;padding:10px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.875rem;min-height:88px;resize:vertical;font-family:inherit;outline:none;color:#374151}
.modal-notes:focus{border-color:#3b82f6}
.modal-footer{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.btn-modal-apply{padding:10px 20px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:.875rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-modal-apply:hover{background:#1d4ed8}
.btn-modal-close{padding:10px 18px;background:#f8fafc;color:#64748b;border:1.5px solid #e2e8f0;border-radius:8px;font-size:.875rem;cursor:pointer}
.btn-modal-close:hover{background:#f1f5f9}
.match-bar{background:#f1f5f9;border-radius:4px;height:6px;margin-top:6px;overflow:hidden}
.match-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#3b82f6,#06b6d4);transition:.6s}

/* Empty / loading */
.empty{text-align:center;padding:80px 20px;color:#94a3b8;grid-column:1/-1}
.empty h2{font-size:1.1rem;margin-bottom:8px;color:#64748b}
.empty code{background:#f1f5f9;padding:3px 8px;border-radius:4px;font-size:.85rem;color:#0f172a}
.spinner{width:36px;height:36px;border:3px solid #e2e8f0;border-top-color:#3b82f6;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Docs panel */
.docs-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.65);z-index:300;align-items:flex-start;justify-content:flex-end}
.docs-overlay.open{display:flex}
.docs-panel{background:#fff;width:min(780px,96vw);height:100vh;display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,.18)}
.docs-panel-head{background:#0f172a;color:#fff;padding:18px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.docs-panel-title{font-size:.9rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.docs-close{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:6px;width:32px;height:32px;font-size:1.1rem;cursor:pointer;flex-shrink:0}
.docs-close:hover{background:rgba(255,255,255,.22)}
.docs-tabs{display:flex;border-bottom:1.5px solid #e2e8f0;background:#f8fafc;flex-shrink:0}
.doc-tab{flex:1;padding:11px 8px;border:none;background:transparent;font-size:.82rem;font-weight:600;cursor:pointer;color:#64748b;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:.15s}
.doc-tab.active{color:#2563eb;border-bottom-color:#2563eb;background:#fff}
.doc-tab:hover:not(.active){background:#f1f5f9}
.docs-toolbar{padding:10px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.btn-print{padding:7px 14px;background:#2563eb;color:#fff;border:none;border-radius:7px;font-size:.8rem;font-weight:700;cursor:pointer}
.btn-print:hover{background:#1d4ed8}
.docs-body{flex:1;overflow-y:auto;padding:28px 32px}

/* Resume doc styles */
.rdoc-header{text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid #0f172a}
.rdoc-name{font-size:1.55rem;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#0f172a}
.rdoc-headline{font-size:.82rem;color:#374151;margin:4px 0}
.rdoc-contact{font-size:.78rem;color:#64748b}
.rdoc-contact a{color:#2563eb}
.rdoc-section{margin-bottom:14px}
.rdoc-section-title{font-size:.72rem;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:#0f172a;border-bottom:1.5px solid #0f172a;padding-bottom:2px;margin-bottom:7px}
.rdoc-summary{font-size:.875rem;color:#374151;line-height:1.65;text-align:justify}
.rdoc-skill-row{display:flex;margin-bottom:4px;font-size:.82rem}
.rdoc-skill-label{font-weight:700;white-space:nowrap;min-width:175px;color:#0f172a}
.rdoc-skill-items{color:#374151}
.rdoc-job-header{display:flex;justify-content:space-between;align-items:baseline;font-size:.9rem;font-weight:700;color:#0f172a}
.rdoc-job-dates{font-weight:400;font-style:italic;font-size:.8rem;color:#64748b}
.rdoc-job-sub{font-size:.78rem;color:#64748b;font-style:italic;margin-bottom:5px}
.rdoc-bullets{margin-left:18px;font-size:.83rem;color:#374151}
.rdoc-bullets li{margin-bottom:4px;line-height:1.55}
.rdoc-note{font-size:.78rem;color:#64748b;margin-top:2px}
.rdoc-project-header{display:flex;align-items:baseline;gap:5px;margin-bottom:2px}
.rdoc-project-name{font-weight:700;font-size:.88rem;color:#0f172a}
.rdoc-project-sub{font-size:.78rem;color:#64748b;font-style:italic}
.rdoc-project{margin-bottom:8px}

/* Cover letter styles */
.letter-doc{font-size:.875rem;color:#1e293b;line-height:1.7}
.letter-sender{margin-bottom:22px;line-height:1.9;font-size:.85rem}
.letter-date{margin-bottom:16px;color:#475569}
.letter-to{margin-bottom:16px;line-height:1.8;font-size:.85rem}
.letter-subject{font-weight:700;margin-bottom:18px;color:#0f172a}
.letter-body p{margin-bottom:14px;text-align:justify}
.letter-body a{color:#2563eb}

/* ATS badge on resume */
.ats-badge-bar{display:flex;align-items:flex-start;gap:14px;padding:12px 16px;background:#f0fdf4;border:1.5px solid #86efac;border-radius:10px;margin-bottom:18px}
.ats-badge-text{flex:1;min-width:0}
.ats-badge-score{font-size:1.05rem;font-weight:800;margin-bottom:3px}
.ats-badge-sub{font-size:.78rem;color:#475569;margin-bottom:6px}
.ats-kws{display:flex;flex-wrap:wrap;gap:4px}
.ats-m{padding:2px 7px;background:#dcfce7;color:#166534;border-radius:12px;font-size:.67rem;font-weight:700}
.ats-x{padding:2px 7px;background:#fee2e2;color:#991b1b;border-radius:12px;font-size:.67rem}

/* Docs button in modal */
.btn-docs{padding:10px 18px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:.875rem;font-weight:700;cursor:pointer}
.btn-docs:hover{background:#6d28d9}

@media(max-width:640px){
  header,.filters,.main{padding-left:16px;padding-right:16px}
  .stats{gap:16px}.stat .num{font-size:1.5rem}
  .jobs-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>Abhyankar's <span>Job Portal</span></h1>
      <p>Systems &amp; Solutions Engineer &nbsp;·&nbsp; Boston, MA &nbsp;·&nbsp; F-1 OPT Jul 2026<br>
      SDLC/PLC · Requirements · Test Management · Jira · SQL · Python · BI</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="num" id="sTotal">0</div><div class="lbl">Total</div></div>
      <div class="stat"><div class="num" id="sSaved">0</div><div class="lbl">Saved</div></div>
      <div class="stat"><div class="num" id="sApplied">0</div><div class="lbl">Applied</div></div>
      <div class="stat"><div class="num" id="sInterview">0</div><div class="lbl">Interviews</div></div>
    </div>
  </div>
</header>

<div class="filters">
  <div class="filters-inner">
    <div class="search-wrap">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search jobs, companies, skills…" oninput="filterAndRender()">
    </div>
    <select id="roleFilter" onchange="filterAndRender()">
      <option value="">All Roles</option>
      <option value="systems engineer">Systems Engineer</option>
      <option value="solutions engineer">Solutions Engineer</option>
      <option value="business analyst">Business Analyst</option>
      <option value="data analyst">Data Analyst</option>
      <option value="program manager">Program Manager</option>
      <option value="test">QA / Test</option>
      <option value="consultant">Consultant</option>
      <option value="requirements">Requirements Engineer</option>
    </select>
    <select id="locFilter" onchange="filterAndRender()">
      <option value="">All Locations</option>
      <option value="boston">Boston, MA</option>
      <option value="remote">Remote</option>
      <option value="hybrid">Hybrid</option>
      <option value="new york">New York</option>
    </select>
    <select id="statusFilter" onchange="filterAndRender()">
      <option value="">All Statuses</option>
      <option value="new">New</option>
      <option value="saved">Saved</option>
      <option value="applied">Applied</option>
      <option value="interview">Interview</option>
      <option value="rejected">Rejected</option>
    </select>
    <button class="scrape-btn" id="scrapeBtn" onclick="reloadJobs()">
      ↻ Refresh
    </button>
  </div>
</div>

<div class="main">
  <div class="results-bar">
    <div class="results-count" id="resultsCount">Loading…</div>
    <div class="view-btns">
      <button class="view-btn active" id="vGrid" onclick="setView('grid')">▦ Grid</button>
      <button class="view-btn" id="vList" onclick="setView('list')">☰ List</button>
    </div>
  </div>
  <div id="container" class="jobs-grid">
    <div class="empty"><div class="spinner"></div><p>Loading jobs…</p></div>
  </div>
</div>

<!-- Docs Panel -->
<div class="docs-overlay" id="docsOverlay" onclick="if(event.target===this)closeDocsPanel()">
  <div class="docs-panel">
    <div class="docs-panel-head">
      <div class="docs-panel-title" id="docsPanelTitle"></div>
      <button class="docs-close" onclick="closeDocsPanel()">✕</button>
    </div>
    <div class="docs-tabs">
      <button class="doc-tab active" data-tab="resume" onclick="switchDocTab('resume')">📄 Tailored Resume</button>
      <button class="doc-tab"        data-tab="cover"  onclick="switchDocTab('cover')">✉️ Cover Letter</button>
    </div>
    <div class="docs-toolbar">
      <button class="btn-print" onclick="printCurrentDoc()">🖨 Print / Save PDF</button>
    </div>
    <div id="atsInfo"></div>
    <div class="docs-body" id="docsBody"></div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="mTitle"></h2>
    <div class="modal-co" id="mCo"></div>
    <div class="modal-sec">
      <h3>Details</h3>
      <div class="meta-row" id="mMeta"></div>
    </div>
    <div class="modal-sec">
      <h3>Skill match</h3>
      <div id="mMatchBar" style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:.75rem;color:#64748b">
          <span id="mMatchLbl"></span><span id="mMatchPct"></span>
        </div>
        <div class="match-bar"><div class="match-fill" id="mMatchFill"></div></div>
      </div>
      <div class="tags-row" id="mTags"></div>
    </div>
    <div class="modal-sec">
      <h3>Description</h3>
      <p class="modal-desc" id="mDesc"></p>
    </div>
    <div class="modal-sec">
      <h3>Application status</h3>
      <select class="modal-status" id="mStatus" onchange="persist()">
        <option value="new">New — not yet applied</option>
        <option value="saved">Saved — apply later</option>
        <option value="applied">Applied</option>
        <option value="interview">Interview scheduled</option>
        <option value="rejected">Rejected / Closed</option>
      </select>
    </div>
    <div class="modal-sec">
      <h3>Notes</h3>
      <textarea class="modal-notes" id="mNotes" placeholder="Recruiter contact, deadline, salary notes, next steps…" oninput="persist()"></textarea>
    </div>
    <div class="modal-footer">
      <a id="mApply" href="#" target="_blank" class="btn-modal-apply">Apply Now ↗</a>
      <button class="btn-docs" onclick="(function(){var id=currentId;closeModal();openDocsPanel(id);})()">📄 Generate Docs</button>
      <button class="btn-modal-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<script src="docs.js"></script>
<script>
const MY_SKILLS = [
  'sdlc','plc','jira','python','sql','requirements','test management','validation',
  'agile','scrum','bi','tableau','power bi','business analyst','systems engineer',
  'solutions engineer','program management','stakeholder','data model','database',
  'excel','java','c++','process improvement','traceability','defect','test case',
  'business intelligence','implementation','consulting','risk analysis','gap analysis'
];

let allJobs = [];
let currentId = null;
let currentView = 'grid';

const store = {
  get: id => JSON.parse(localStorage.getItem('jb_' + id) || '{}'),
  set: (id, d) => localStorage.setItem('jb_' + id, JSON.stringify(d)),
  status: id => store.get(id).status || 'new',
  notes: id => store.get(id).notes || ''
};

function calcMatch(job) {
  const haystack = [job.title, ...(job.tags||[]), job.description||'', job.company||'']
    .join(' ').toLowerCase();
  const hits = MY_SKILLS.filter(s => haystack.includes(s));
  return Math.min(100, Math.round((hits.length / 7) * 100));
}

function matchClass(s){ return s>=70?'match-high':s>=40?'match-mid':'match-low' }

const LOGO_GRADIENTS = [
  '#667eea,#764ba2','#f093fb,#f5576c','#4facfe,#00f2fe',
  '#43e97b,#38f9d7','#fa709a,#fee140','#a18cd1,#fbc2eb',
  '#fccb90,#d57eeb','#a1c4fd,#c2e9fb','#fd7043,#ff8a65',
  '#26a69a,#00897b','#5c6bc0,#3949ab','#ec407a,#d81b60'
];
function logoGrad(name){ let h=0;for(const c of name)h+=c.charCodeAt(0);return LOGO_GRADIENTS[h%LOGO_GRADIENTS.length] }
function initials(name){ return name.split(/\s+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase() }

function locChip(loc){
  const l=(loc||'').toLowerCase();
  if(l.includes('remote'))return 'remote-chip';
  if(l.includes('hybrid'))return 'hybrid-chip';
  return '';
}

function fmtDate(d){
  if(!d)return '';
  try{
    const diff=Math.floor((Date.now()-new Date(d))/(864e5));
    if(diff<=0)return 'Today';
    if(diff===1)return 'Yesterday';
    if(diff<7)return diff+'d ago';
    if(diff<30)return Math.floor(diff/7)+'w ago';
    return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }catch{return d}
}

function statusBadge(st){
  if(st==='saved')return '<span class="status-dot dot-saved">Saved</span>';
  if(st==='applied')return '<span class="status-dot dot-applied">Applied</span>';
  if(st==='interview')return '<span class="status-dot dot-interview">Interview</span>';
  if(st==='rejected')return '<span class="status-dot dot-rejected">Rejected</span>';
  return '';
}

function renderCard(job){
  const st=store.status(job.id);
  const m=calcMatch(job);
  const grad=logoGrad(job.company);
  const tags=(job.tags||[]).slice(0,5);
  const salary=job.salary?`<span class="meta-chip">💰 ${job.salary}</span>`:'';
  const saveLbl=st==='saved'?'★ Saved':'☆ Save';

  return `<div class="job-card${st!=='new'?' '+st:''}" onclick="openModal('${job.id}')">
    ${statusBadge(st)}
    <div class="card-top">
      <div class="company-row">
        <div class="logo" style="background:linear-gradient(135deg,${grad})">${initials(job.company)}</div>
        <div>
          <div class="company-name">${esc(job.company)}</div>
          <div class="job-title">${esc(job.title)}</div>
        </div>
      </div>
      <span class="match-pill ${matchClass(m)}">${m}% match</span>
    </div>
    <div class="meta-row">
      <span class="meta-chip ${locChip(job.location)}">📍 ${esc(job.location)}</span>
      <span class="meta-chip">💼 ${esc(job.type||'Full-time')}</span>
      ${salary}
    </div>
    <div class="tags-row">
      ${tags.map(t=>`<span class="tag${MY_SKILLS.includes(t.toLowerCase())?' skill-match':''}">${esc(t)}</span>`).join('')}
    </div>
    <div class="card-footer">
      <div class="footer-left">
        <div>${fmtDate(job.date)}</div>
        <div class="source">via ${esc(job.source||'')}</div>
      </div>
      <div class="card-btns" onclick="event.stopPropagation()">
        <a class="btn-apply" href="${esc(job.url)}" target="_blank" rel="noopener">Apply ↗</a>
        <button class="btn-save${st==='saved'?' on':''}" onclick="quickSave('${job.id}',this)">${saveLbl}</button>
      </div>
    </div>
  </div>`;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

function quickSave(id, btn){
  const cur=store.status(id);
  const next=cur==='saved'?'new':'saved';
  store.set(id,{status:next,notes:store.notes(id)});
  btn.textContent=next==='saved'?'★ Saved':'☆ Save';
  btn.classList.toggle('on',next==='saved');
  const card=btn.closest('.job-card');
  card.classList.toggle('saved',next==='saved');
  if(next!=='saved')card.classList.remove('saved');
  // update status badge
  const existing=card.querySelector('.status-dot');
  if(existing)existing.remove();
  if(next!=='new')card.insertAdjacentHTML('afterbegin',statusBadge(next));
  updateStats();
}

function openModal(id){
  currentId=id;
  const job=allJobs.find(j=>j.id===id);
  if(!job)return;
  const st=store.status(id);
  const m=calcMatch(job);

  document.getElementById('mTitle').textContent=job.title;
  document.getElementById('mCo').textContent=job.company+' — '+job.location;
  document.getElementById('mMeta').innerHTML=`
    <span class="meta-chip ${locChip(job.location)}">📍 ${esc(job.location)}</span>
    <span class="meta-chip">💼 ${esc(job.type||'Full-time')}</span>
    ${job.salary?`<span class="meta-chip">💰 ${esc(job.salary)}</span>`:''}
    <span class="meta-chip">📅 ${fmtDate(job.date)}</span>
    <span class="meta-chip">🔗 ${esc(job.source)}</span>
  `;
  document.getElementById('mMatchLbl').textContent='Skills match';
  document.getElementById('mMatchPct').textContent=m+'%';
  document.getElementById('mMatchFill').style.width=m+'%';
  document.getElementById('mTags').innerHTML=(job.tags||[])
    .map(t=>`<span class="tag${MY_SKILLS.includes(t.toLowerCase())?' skill-match':''}">${esc(t)}</span>`).join('');
  document.getElementById('mDesc').textContent=job.description||'Click Apply to view the full job description on the company site.';
  document.getElementById('mStatus').value=st;
  document.getElementById('mNotes').value=store.notes(id);
  document.getElementById('mApply').href=job.url;
  document.getElementById('overlay').classList.add('open');
}

function persist(){
  if(!currentId)return;
  const st=document.getElementById('mStatus').value;
  const notes=document.getElementById('mNotes').value;
  store.set(currentId,{status:st,notes});
  renderVisible();
  updateStats();
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); currentId=null; }
function overlayClick(e){ if(e.target===document.getElementById('overlay'))closeModal(); }

function getFiltered(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const role=document.getElementById('roleFilter').value.toLowerCase();
  const loc=document.getElementById('locFilter').value.toLowerCase();
  const st=document.getElementById('statusFilter').value;
  return allJobs.filter(j=>{
    if(q){
      const hay=(j.title+' '+j.company+' '+(j.tags||[]).join(' ')+' '+(j.description||'')).toLowerCase();
      if(!hay.includes(q))return false;
    }
    if(role){
      const t=j.title.toLowerCase();
      if(role==='test'){if(!t.includes('test')&&!t.includes('qa')&&!t.includes('quality'))return false}
      else if(!t.includes(role))return false;
    }
    if(loc&&!(j.location||'').toLowerCase().includes(loc))return false;
    if(st&&store.status(j.id)!==st)return false;
    return true;
  });
}

function renderVisible(){
  const jobs=getFiltered().sort((a,b)=>calcMatch(b)-calcMatch(a));
  const c=document.getElementById('container');
  document.getElementById('resultsCount').textContent=`${jobs.length} job${jobs.length!==1?'s':''} found`;
  if(!jobs.length){
    c.innerHTML='<div class="empty"><h2>No jobs match your filters</h2><p>Try adjusting the search or filters above.</p></div>';
    return;
  }
  c.innerHTML=jobs.map(renderCard).join('');
}

function filterAndRender(){ renderVisible(); }

function setView(v){
  currentView=v;
  document.getElementById('container').className=v==='grid'?'jobs-grid':'jobs-list';
  document.getElementById('vGrid').classList.toggle('active',v==='grid');
  document.getElementById('vList').classList.toggle('active',v==='list');
}

function updateStats(){
  document.getElementById('sTotal').textContent=allJobs.length;
  document.getElementById('sSaved').textContent=allJobs.filter(j=>store.status(j.id)==='saved').length;
  document.getElementById('sApplied').textContent=allJobs.filter(j=>store.status(j.id)==='applied').length;
  document.getElementById('sInterview').textContent=allJobs.filter(j=>store.status(j.id)==='interview').length;
}

async function reloadJobs(){
  const btn=document.getElementById('scrapeBtn');
  btn.textContent='Loading…'; btn.disabled=true;
  try{
    const r=await fetch('jobs.json?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    allJobs=await r.json();
    updateStats();
    renderVisible();
    btn.textContent='✓ Refreshed';
    setTimeout(()=>{btn.textContent='↻ Refresh';btn.disabled=false},1500);
  }catch(e){
    btn.textContent='↻ Refresh';btn.disabled=false;
    document.getElementById('container').innerHTML=`
      <div class="empty">
        <h2>Could not load jobs.json</h2>
        <p>Run the scraper, then serve with:</p>
        <p style="margin-top:10px"><code>python scraper.py</code></p>
        <p style="margin-top:6px"><code>python -m http.server 8080</code></p>
        <p style="margin-top:6px">Then open <code>http://localhost:8080</code></p>
      </div>`;
  }
}

reloadJobs();
</script>
</body>
</html>
